name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      dolt:
        image: dolthub/dolt-sql-server:latest
        env:
          DOLT_ROOT_PASSWORD: dolt
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -u root -pdolt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run linting
        run: uv run ruff check src/django_dolt

      - name: Run type checking
        run: uv run mypy src/django_dolt

      - name: Run tests
        run: uv run pytest
        env:
          DOLT_HOST: 127.0.0.1
